<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" role="img" aria-label="MegaPDF splash screen">
  <defs>
    <linearGradient id="mpsBg" x1="0" y1="0" x2="620" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07243F"/>
      <stop offset="1" stop-color="#0C567D"/>
    </linearGradient>
    <linearGradient id="mpsTile" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A5BC4"/>
      <stop offset="1" stop-color="#0FA8C6"/>
    </linearGradient>
    <linearGradient id="mpsStroke" x1="90" y1="172" x2="168" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E6FD8"/>
      <stop offset="1" stop-color="#18B6C8"/>
    </linearGradient>
    <radialGradient id="mpsSheen" cx="0.22" cy="0.08" r="1.1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mpsWord" x1="392" y1="0" x2="556" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3FA9F5"/>
      <stop offset="1" stop-color="#2BD4D0"/>
    </linearGradient>
    <linearGradient id="mpsSwash" x1="200" y1="0" x2="436" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3FA9F5"/>
      <stop offset="1" stop-color="#2BD4D0"/>
    </linearGradient>
  </defs>

  <rect width="620" height="300" fill="url(#mpsBg)"/>

  <!-- Oversized page watermark, cropped at the right edge -->
  <g opacity="0.06" transform="translate(360,-40) scale(2.2)">
    <path d="M92 52 H150 L186 88 V190 a14 14 0 0 1 -14 14 H92 a14 14 0 0 1 -14 -14 V66 a14 14 0 0 1 14 -14 Z"
          fill="none" stroke="#FFFFFF" stroke-width="4"/>
    <path d="M150 52 V74 a14 14 0 0 0 14 14 h22" fill="none" stroke="#FFFFFF" stroke-width="4"/>
  </g>

  <!-- Lockup -->
  <g transform="translate(120,70) scale(0.40625)">
    <rect width="256" height="256" rx="58" fill="url(#mpsTile)"/>
    <rect width="256" height="256" rx="58" fill="url(#mpsSheen)"/>
    <path d="M92 52 H150 L186 88 V190 a14 14 0 0 1 -14 14 H92 a14 14 0 0 1 -14 -14 V66 a14 14 0 0 1 14 -14 Z" fill="#FFFFFF"/>
    <path d="M150 52 V74 a14 14 0 0 0 14 14 h22 Z" fill="#D6E7F8"/>
    <g stroke="#C9DCEF" stroke-width="9" stroke-linecap="round">
      <path d="M96 96 H138"/>
      <path d="M96 118 H166"/>
    </g>
    <path d="M90 138c-3 6 0 11 6 12c8 2 16 10 26 22L168 104"
          fill="none" stroke="url(#mpsStroke)" stroke-width="12"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="246" y="140" font-family="'Segoe UI Variable Display','Segoe UI',system-ui,sans-serif"
        font-size="64" font-weight="600" letter-spacing="-1.5"><tspan fill="#F2F7FC">Mega</tspan><tspan fill="url(#mpsWord)">PDF</tspan></text>

  <!-- Tagline -->
  <text x="310" y="204" text-anchor="middle" font-family="'Segoe UI Variable Text','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="600" letter-spacing="5" fill="#9FC2DC">OPEN. FIX. SAVE. DONE.</text>

  <!-- Pen-swash echo of the icon stroke, ending in a check flick -->
  <path d="M200 242 C 280 256, 360 256, 420 240 L 434 220"
        fill="none" stroke="url(#mpsSwash)" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Footer -->
  <text x="310" y="282" text-anchor="middle" font-family="'Segoe UI Variable Text','Segoe UI',system-ui,sans-serif"
        font-size="11" font-weight="400" letter-spacing="2" fill="#6E93B0">FREE &amp; OPEN SOURCE</text>
</svg>
